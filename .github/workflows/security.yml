name: DevSecOps Security Scan

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🔐 Secrets scan
      - name: Detect exposed secrets (Gitleaks)
        uses: zricethezav/gitleaks-action@v2

      # 🔍 SAST
      - name: Static code analysis (Semgrep)
        uses: returntocorp/semgrep-action@v1

      # 📦 Dependency scan
      - name: Scan filesystem vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # 🐳 Container
      - name: Build Docker image
        run: docker build -t test-app .

      - name: Scan container image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'test-app'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
